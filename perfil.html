<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluentCode - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        main.main-expandido {
            margin-left: 260px;
        }

        body {
            background-color: #0d1b2a;
            color: #ffffff;
        }

        .bg-dark-blue {
            background-color: #0b2545;
        }

        .bg-card-blue {
            background-color: #134074;
        }

        @media (max-width:768px) {

            main {
                margin-left: 0 !important;
                padding: 16px !important;
            }

            #sidebar {
                display: none;
            }

            #toggleSidebar {
                display: none;
            }
        }
        #sidebar.sidebar-expandida {
            width: 260px;
        }

        main.main-expandido {
            margin-left: 260px;
        }

        .menu-text {
            white-space: nowrap;
        }
    </style>
</head>

<body class="font-sans antialiased">

    <button id="toggleSidebar" class="fixed top-5 left-16 z-[9999] bg-slate-800 text-white w-10 h-10 rounded-full shadow-lg flex items-center
    justify-center">
        <i class="fa-solid fa-chevron-right"></i>
    </button>


    <aside id="sidebar" class="fixed left-0 top-0 h-screen bg-dark-blue z-40
    w-16 overflow-y-auto overflow-x-hidden transition-all duration-300">

        <div class="p-4">
            <div class="text-2xl font-bold text-white mb-8 flex items-center gap-2">
                <i class="fa-solid fa-code text-blue-400"></i>
                <span class="menu-text hidden">FluentCode</span>
            </div>
            <nav class="space-y-4">
                <button onclick="window.location.href='index.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-house w-5 text-center"></i>
                    <span class="menu-text hidden">Início</span>
                </button>
                <button onclick="alternarAba('progresso')"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-chart-line w-5 text-center"></i>
                    <span class="menu-text hidden">Progresso</span>
                </button>
                <button onclick="window.location.href='trilhas.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-hill-avalanche w-5 text-center"></i>
                    <span class="menu-text hidden">Trilhas</span>
                </button>
                <button onclick="window.location.href='ranking.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-trophy w-5 text-center"></i>
                    <span class="menu-text hidden">Ranking</span>
                </button>
                <button onclick="window.location.href='atividades.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-tasks w-5 text-center"></i>
                    <span class="menu-text hidden">Atividades</span>
                </button>
                <button onclick="window.location.href='jogos.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-gamepad w-5 text-center"></i>
                    <span class="menu-text hidden">Jogos</span>
                </button>
                <button onclick="window.location.href='desenvolvedores.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-laptop-code w-5 text-center"></i>
                    <span class="menu-text hidden">Desenvolvedores</span>
                </button>
                <button onclick="window.location.href='estatisticas.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-chart-bar w-5 text-center"></i>
                    <span class="menu-text hidden">Estatísticas</span>
                </button>
                <button onclick="window.location.href='perfil.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-user w-5 text-center"></i>
                    <span class="menu-text hidden">Perfil</span>
                </button>
                <button onclick="window.location.href='config.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-cog w-5 text-center"></i>
                    <span class="menu-text hidden">Configurações</span>
                </button>
                <button onclick="window.location.href='sair.html'"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-slate-800 transition">
                    <i class="fa-solid fa-sign-out-alt w-5 text-center"></i>
                    <span class="menu-text hidden">Sair</span>
                </button>
            </nav>
        </div>

        <div id="modal-feedback" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60">
            <div id="modal-feedback-box"
                class="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md text-center shadow-2xl">

                <div id="modal-emoji" class="text-5xl mb-3">🎉</div>

                <h2 id="modal-titulo" class="text-2xl font-bold text-green-400">
                    Correto!
                </h2>

                <p id="modal-texto" class="text-gray-300 mt-3 text-sm leading-relaxed">
                    ...
                </p>

                <button onclick="fecharModalFeedback()"
                    class="mt-5 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold">
                    Continuar
                </button>
            </div>
        </div>
        <div id="feedback-resposta"></div>

        <div
            class="menu-text hidden bg-gradient-to-tr from-blue-700 to-indigo-900 p-4 rounded-2xl text-center relative overflow-hidden">
            <p class="text-sm font-semibold mb-2">
                Aprenda Java e Inglês Técnico de um jeito divertido!
            </p>
            <div class="text-4xl">🤖</div>
        </div>
    </aside>



    <main class="flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto w-full max-w-6xl mx-auto">

        <div class="flex items-center gap-4 mb-10">
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight">
                Editar Perfil
            </h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- CARD PERFIL -->
            <div class="bg-card-blue p-8 rounded-3xl text-center shadow-xl border border-white/10">

                <div id="avatarViewer"
                    class="w-24 h-24 md:w-32 md:h-32 mx-auto bg-blue-600 rounded-full flex items-center justify-center text-6xl border-4 border-blue-400 shadow-lg">
                    🪷
                </div>

                <h2 id="nameViewer" class="text-3xl font-bold mt-4">
                    RecrutaDev
                </h2>

                <p id="xpViewer" class="text-blue-300 mt-2">
                    0 XP Acumulados
                </p>

                <div class="grid grid-cols-2 gap-3 mt-6">

                    <div class="bg-slate-900/40 p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Nível</p>
                        <p class="font-bold text-xl">1</p>
                    </div>

                    <div class="bg-slate-900/40 p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Missões</p>
                        <p class="font-bold text-xl">0</p>
                    </div>

                </div>

            </div>

            <!-- FORMULÁRIO -->
            <div class="lg:col-span-2 bg-card-blue p-8 rounded-3xl shadow-xl border border-white/10 space-y-8">

                <div class="space-y-4">

                    <div>
                        <label class="block text-xs uppercase font-bold text-blue-300 tracking-wider mb-2">
                            Nome de Usuário
                        </label>

                        <input type="text" id="usernameInput"
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="Seu apelido">
                    </div>

                    <div>
                        <label class="block text-xs uppercase font-bold text-blue-300 tracking-wider mb-2">
                            E-mail
                        </label>

                        <input type="email" id="emailInput"
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-3 text-white"
                            placeholder="seu@email.com">
                    </div>

                </div>

                <div>

                    <label class="block text-xs uppercase font-bold text-blue-300 tracking-wider mb-3">
                        Escolha seu Personagem
                    </label>

                    <div class="grid grid-cols-4 md:grid-cols-7 gap-2">

                        <button onclick="selectAvatar('🪷')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🪷</button>

                        <button onclick="selectAvatar('🌙')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🌙</button>

                        <button onclick="selectAvatar('🧣')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🧣</button>

                        <button onclick="selectAvatar('🎸')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🎸</button>

                        <button onclick="selectAvatar('❄️')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">❄️</button>

                        <button onclick="selectAvatar('🚗')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🚗</button>

                        <button onclick="selectAvatar('🐈')"
                            class="avatar-option p-3 bg-slate-900/40 rounded-xl text-2xl">🐈</button>

                    </div>

                </div>

                <button onclick="saveProfile()"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar Alterações
                </button>

            </div>

        </div>

    </main>

    <script>
        // Carrega dados mudando o padrão inicial para Flor de Lótus '🪷'
        let currentAvatar = localStorage.getItem("avatar") || "🪷";
        let username = localStorage.getItem("username") || "RecrutaDev";
        let email = localStorage.getItem("email") || "";
        let xp = localStorage.getItem("xp") || "0";

        function initProfile() {

            console.log("nameViewer:", document.getElementById("nameViewer"));
            console.log("avatarViewer:", document.getElementById("avatarViewer"));
            console.log("xpViewer:", document.getElementById("xpViewer"));

        }

        function selectAvatar(emoji) {
            currentAvatar = emoji;
            document.getElementById("avatarViewer").textContent = emoji;
            highlightAvatarButton(emoji);
        }

        function highlightAvatarButton(emoji) {
            const buttons = document.querySelectorAll('.avatar-option');
            buttons.forEach(btn => {
                if (btn.textContent === emoji) {
                    btn.classList.add('border-blue-500', 'bg-blue-900/30');
                } else {
                    btn.classList.remove('border-blue-500', 'bg-blue-900/30');
                }
            });
        }

        function saveProfile() {
            const newName = document.getElementById("usernameInput").value.trim();
            const newEmail = document.getElementById("emailInput").value.trim();

            if (newName === "") {
                alert("O nome de usuário não pode ficar vazio!");
                return;
            }

            localStorage.setItem("username", newName);
            localStorage.setItem("email", newEmail);
            localStorage.setItem("avatar", currentAvatar);

            document.getElementById("nameViewer").textContent = newName;

            alert("Perfil atualizado! As mudanças já refletem no Início. 🎉");
        }

        initProfile();

        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("toggleSidebar");
        const main = document.querySelector("main");

        toggleBtn.addEventListener("click", () => {

            sidebar.classList.toggle("sidebar-expandida");
            main.classList.toggle("main-expandido");

            document.querySelectorAll(".menu-text").forEach(item => {
                item.classList.toggle("hidden");
            });

            const icon = toggleBtn.querySelector("i");

            if (sidebar.classList.contains("sidebar-expandida")) {

                icon.classList.remove("fa-chevron-right");
                icon.classList.add("fa-chevron-left");

                toggleBtn.style.left = "260px";

            } else {

                icon.classList.remove("fa-chevron-left");
                icon.classList.add("fa-chevron-right");

                toggleBtn.style.left = "64px";
            }

        });
    </script>
</body>

</html>
